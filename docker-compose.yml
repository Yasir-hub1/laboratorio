services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_NAME: ${VITE_APP_NAME:-BIOCONTROL}
        VITE_API_URL: ${VITE_API_URL:-http://ws-laboratorio.solucionesinteligentes.pro/api}
    image: laboratorio-frontend:latest
    container_name: laboratorio-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped
